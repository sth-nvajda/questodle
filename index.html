<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Quests</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Playfair Display', 'Cormorant Garamond', serif;
        }
        .light-bg {
            background: linear-gradient(135deg, #f8f5f0 0%, #e8dfd5 100%);
        }
        .dark-bg {
            background: linear-gradient(135deg, #2d1b3d 0%, #1a0f1a 100%);
        }
        .light-card {
            background: rgba(255, 248, 240, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 248, 240, 0.5);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .dark-card {
            background: rgba(45, 27, 61, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(138, 43, 226, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .light-text {
            color: #2d1b3d;
        }
        .dark-text {
            color: #e8dfd5;
        }
        .light-accent {
            color: #8b5cf6;
        }
        .dark-accent {
            color: #a78bfa;
        }
        .gradient-text {
            background: linear-gradient(135deg, #8b5cf6 0%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header-decoration {
            position: relative;
        }
        .header-decoration::before {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #8b5cf6, transparent);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const GameHub = () => {
            const [isDarkMode, setIsDarkMode] = useState(false);
            const [mounted, setMounted] = useState(false);

            useEffect(() => {
                setMounted(true);
            }, []);

            if (!mounted) return null;

            const games = [
                {
                    category: "Word & Text Games",
                    emoji: "📝",
                    games: [
                        { name: "Wordle", url: "https://www.nytimes.com/games/wordle/index.html", emoji: "🎯" },
                        { name: "Connections", url: "https://www.nytimes.com/games/connections", emoji: "🔤" },
                        { name: "Contexto", url: "https://contexto.me/en/", emoji: "🔍" },
                        { name: "Redactle", url: "https://redactle.net/", emoji: "📄" },
                        { name: "Clueless", url: "https://lessgames.com/clueless", emoji: "🧩" },
                        { name: "LOLdle", url: "https://loldle.net/", emoji: "🎮" },
                        { name: "Narutodle", url: "https://narutodle.net/", emoji: "🍥" },
                        { name: "McDle", url: "https://www.mcdle.net/", emoji: "🍔" }
                    ]
                },
                {
                    category: "Geography & Travel",
                    emoji: "🗺️",
                    games: [
                        { name: "Worldle", url: "https://worldle.teuteuf.fr/", emoji: "🌍" },
                        { name: "Travle", url: "https://travle.earth/", emoji: "✈️" }
                    ]
                },
                {
                    category: "Media & Entertainment",
                    emoji: "🎬",
                    games: [
                        { name: "AnimeGuessr", url: "https://aniguessr.com/", emoji: "🎌" },
                        { name: "Guess the Movie", url: "https://guessthemovie.name/", emoji: "🎬" },
                        { name: "FoodGuessr", url: "https://foodguessr.com/", emoji: "🍜" },
                        { name: "Bracket City", url: "https://www.theatlantic.com/games/bracket-city/", emoji: "🏆" }
                    ]
                }
            ];

            const toggleTheme = () => {
                setIsDarkMode(!isDarkMode);
            };

            const themeClasses = isDarkMode ? 'dark-bg dark-text' : 'light-bg light-text';
            const cardClasses = isDarkMode ? 'dark-card' : 'light-card';
            const accentClasses = isDarkMode ? 'dark-accent' : 'light-accent';

            return (
                <div className={`min-h-screen ${themeClasses} transition-all duration-700`}>
                    <div className="container mx-auto px-4 py-8">
                        {/* Header */}
                        <header className="text-center mb-12">
                            <div className="header-decoration">
                                <h1 className="text-5xl font-light tracking-wider mb-2">
                                    <span className={`${accentClasses} mr-3`}>🎌</span>
                                    <span className="gradient-text">Daily Quests</span>
                                    <span className={`${accentClasses} ml-3`}>🎌</span>
                                </h1>
                            </div>
                            <p className="text-xl opacity-80 mb-8 italic">日常のクエスト</p>
                            
                            {/* Theme Toggle */}
                            <button 
                                onClick={toggleTheme}
                                className={`px-8 py-3 rounded-full ${cardClasses} transition-all duration-500 hover:shadow-xl transform hover:scale-105 border-2 ${isDarkMode ? 'border-purple-400' : 'border-amber-200'}`}
                            >
                                <span className="flex items-center">
                                    <span className="mr-2">{isDarkMode ? '☀️' : '🌙'}</span>
                                    {isDarkMode ? 'Light Mode' : 'Dark Mode'}
                                </span>
                            </button>
                        </header>

                        {/* Game Categories */}
                        <div className="space-y-10">
                            {games.map((category, index) => (
                                <div key={index} className={`${cardClasses} rounded-3xl p-8 shadow-xl border border-opacity-30`}>
                                    <div className="flex items-center mb-6">
                                        <span className="text-4xl mr-4">{category.emoji}</span>
                                        <h2 className="text-3xl font-medium">{category.category}</h2>
                                    </div>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {category.games.map((game, gameIndex) => (
                                            <a 
                                                key={gameIndex}
                                                href={game.url}
                                                target="_blank"
                                                rel="noopener noreferrer"
                                                className={`${cardClasses} rounded-2xl p-6 hover:shadow-2xl transition-all duration-500 transform hover:scale-105 border border-opacity-20`}
                                            >
                                                <div className="flex items-center">
                                                    <span className="text-4xl mr-4">{game.emoji}</span>
                                                    <div>
                                                        <h3 className="font-medium text-xl">{game.name}</h3>
                                                        <p className="text-sm opacity-70 italic">Click to play</p>
                                                    </div>
                                                </div>
                                            </a>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>

                        {/* Footer */}
                        <footer className="text-center mt-12 pt-8 border-t border-opacity-20">
                            <p className="opacity-60 text-lg italic">Find your zen through play</p>
                        </footer>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<GameHub />, document.getElementById('root'));
    </script>
</body>
</html>
